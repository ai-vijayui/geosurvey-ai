x-api-env: &api-env
  DATABASE_URL: postgresql://geosurvey:geosurvey@postgres:5432/geosurvey
  REDIS_URL: redis://redis:6379
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_ENDPOINT_URL: http://minio:9000
  AWS_BUCKET_NAME: geosurvey-files
  AWS_REGION: us-east-1
  NVIDIA_API_KEY: ${NVIDIA_API_KEY}
  NVIDIA_API_BASE_URL: ${NVIDIA_API_BASE_URL:-https://integrate.api.nvidia.com/v1}
  NVIDIA_LLM_MODEL: ${NVIDIA_LLM_MODEL:-openai/gpt-oss-120b}
  CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
  CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
  WEB_ORIGIN: http://localhost:5173
  PDAL_PATH: /usr/bin/pdal
  GDAL_PATH: /usr/bin/gdal_contour
  PORT: 4000

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: geosurvey
      POSTGRES_PASSWORD: geosurvey
      POSTGRES_DB: geosurvey
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geosurvey"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    environment: *api-env
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "npx prisma generate --schema=/app/prisma/schema.prisma &&
             until npx prisma migrate deploy --schema=/app/prisma/schema.prisma; do
               echo 'Waiting for PostgreSQL to finish restarting...';
               sleep 2;
             done &&
             npm run dev -w @geosurvey-ai/api"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    environment:
      <<: *api-env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      - api
    restart: unless-stopped
    command: >
      sh -c "npx prisma generate --schema=/app/prisma/schema.prisma &&
             npm run worker -w @geosurvey-ai/api"

  db-seed:
    profiles: ["seed"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    environment:
      <<: *api-env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy --schema=/app/prisma/schema.prisma &&
             npx prisma db seed"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    environment:
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
      VITE_API_BASE_URL: ""
      VITE_API_PROXY_TARGET: http://api:4000
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
    depends_on:
      - api
    restart: unless-stopped
    command: npm run dev -w @geosurvey-ai/web -- --host 0.0.0.0

volumes:
  postgres_data:
  minio_data:
